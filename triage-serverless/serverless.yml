service: triage-serverless

provider:
  name: aws
  runtime: python3.9
  stage: ${opt:stage, 'dev'}
  region: us-east-1

  # Variables de entorno globales para todas las Lambdas
  environment:
    DYNAMODB_TICKETS_TABLE: t_tickets
    SERVICE_NAME: ${self:service}
    STAGE: ${self:provider.stage}

  # Permisos globales de IAM para las funciones
  iam:
    role:
      statements:
        # Permisos para que las Lambdas lean/escriban en tu tabla de DynamoDB e Índices
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
          Resource:
            - arn:aws:dynamodb:${self:provider.region}:*:table/t_tickets
            - arn:aws:dynamodb:${self:provider.region}:*:table/t_tickets/index/*

        # Permiso para que un Lambda pueda invocar a otro de manera síncrona o asíncrona
        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource: "arn:aws:lambda:${self:provider.region}:*:function:${self:service}-${self:provider.stage}-*"

functions:

  # 1. Tu Lambda de Validación de Accesos (el escudo de seguridad)
  ValidarTokenAcceso:
    handler: src/auth/validar_token.lambda_handler # Asegúrate de que apunte a tu archivo real

  # 2. Tu Lambda de Clasificación Inteligente (la que usa Groq / SQS)
  ClasificarTicket:
    handler: src/tickets/clasificar_ticket.lambda_handler
    # Si esta función se gatilla por SQS, aquí iría su respectivo bloque 'events'

  # 3. La función de Obtener Tickets que revisamos (con Filtro por GSI y PK)
  ObtenerTickets:
    handler: src/tickets/obtener_tickets.lambda_handler # Reemplaza con la ruta de este archivo
    events:
      - http:
          path: tickets
          method: get
          cors: true

  # 4. La función de Resolver Ticket (la que cambia el estado y dispara el correo)
  ResolverTicket:
    handler: src/tickets/resolver_ticket.lambda_handler # Reemplaza con la ruta de este archivo
    events:
      - http:
          path: tickets/resolver
          method: post
          cors: true

  # 5. El NUEVO Lambda asíncrono que envía los correos mediante AWS SES
  EnviarCorreoNotificacion:
    handler: src/notificaciones/enviar_email.lambda_handler
    environment:
      SENDER_EMAIL: "tu_correo_verificado@gmail.com" # ⚠️ CAMBIA ESTO por tu correo verificado en SES
    iamRoleStatements:
      - Effect: Allow
        Action:
          - ses:SendEmail
          - ses:SendRawEmail
        Resource: "*"