service: triage-serverless

frameworkVersion: '4'

provider:
  name: aws
  runtime: python3.9
  region: us-east-1
  stage: dev
  environment:
    DYNAMODB_USUARIOS_TABLE: t_usuarios
    DYNAMODB_TOKENS_TABLE: t_tokens_acceso
    DYNAMODB_TICKETS_TABLE: t_tickets
    SQS_QUEUE_URL: !Ref TicketsQueue
    SERVICE_NAME: ${self:service}
    STAGE: ${self:provider.stage}

  # Rol administrado de AWS Academy Lab que hereda todos los permisos necesarios
  iam:
    role: arn:aws:iam::${aws:accountId}:role/LabRole

custom:
  pythonRequirements:
    dockerizePip: true

functions:
  # ─────────────────────────────────────────────────────────────────────────
  # AUTH & USUARIOS
  # ─────────────────────────────────────────────────────────────────────────

  # PÚBLICO para Admin / PRIVADO para creación de Empleados
  CrearUsuario:
    handler: src/auth/crear_usuario.lambda_handler
    events:
      - http:
          path: /auth/usuarios
          method: post
          cors: true
          integration: lambda
          request:
            template:
              application/json: |
                {
                  "method": "$context.httpMethod",
                  "path": "$context.path",
                  "headers": {
                    "Authorization": "$input.params('Authorization')"
                  },
                  "body": $input.body
                }

  # Público: Login de Admin o Empleado → retorna token
  LoginUsuario:
    handler: src/auth/login_usuario.lambda_handler
    events:
      - http:
          path: /auth/login
          method: post
          cors: true
          integration: lambda
          request:
            template:
              application/json: |
                {
                  "method": "$context.httpMethod",
                  "path": "$context.path",
                  "headers": {
                    "Authorization": "$input.params('Authorization')"
                  },
                  "body": $input.body
                }

  # PRIVADO: Destruye la sesión e invalida el token
  LogoutUsuario:
    handler: src/auth/logout.lambda_handler
    events:
      - http:
          path: /auth/logout
          method: post
          cors: true
          integration: lambda
          request:
            template:
              application/json: |
                {
                  "method": "$context.httpMethod",
                  "path": "$context.path",
                  "headers": {
                    "Authorization": "$input.params('Authorization')"
                  },
                  "body": $input.body
                }

  # Interna: Solo se invoca lambda-to-lambda, pero exponemos endpoint para tests
  ValidarTokenAcceso:
    handler: src/auth/validar_token.lambda_handler
    events:
      - http:
          path: /auth/validar
          method: post
          cors: true
          integration: lambda
          request:
            template:
              application/json: |
                {
                  "method": "$context.httpMethod",
                  "path": "$context.path",
                  "headers": {
                    "Authorization": "$input.params('Authorization')"
                  },
                  "body": $input.body
                }

  # PRIVADO: El admin actualiza sus áreas (Bloquea borrado si hay empleados activos)
  ActualizarAreas:
    handler: src/auth/actualizar_areas.lambda_handler
    events:
      - http:
          path: /auth/empresas/areas
          method: put
          cors: true
          integration: lambda
          request:
            template:
              application/json: |
                {
                  "method": "$context.httpMethod",
                  "path": "$context.path",
                  "headers": {
                    "Authorization": "$input.params('Authorization')"
                  },
                  "body": $input.body
                }

  # PRIVADO: El admin modifica área y/o contraseña de un empleado
  ActualizarUsuario:
    handler: src/auth/actualizar_usuario.lambda_handler
    events:
      - http:
          path: /auth/usuarios/modificar
          method: put
          cors: true
          integration: lambda
          request:
            template:
              application/json: |
                {
                  "method": "$context.httpMethod",
                  "path": "$context.path",
                  "headers": {
                    "Authorization": "$input.params('Authorization')"
                  },
                  "body": $input.body
                }

  # ─────────────────────────────────────────────────────────────────────────
  # TICKETS
  # ─────────────────────────────────────────────────────────────────────────

  # PRIVADO: El Admin carga tickets masivos desde un CSV convertido a JSON array
  CargarCsv:
    handler: src/tickets/cargar_csv.lambda_handler
    events:
      - http:
          path: /tickets/csv
          method: post
          cors: true
          integration: lambda
          request:
            template:
              application/json: |
                {
                  "method": "$context.httpMethod",
                  "path": "$context.path",
                  "headers": {
                    "Authorization": "$input.params('Authorization')"
                  },
                  "body": $input.body
                }

  # PRIVADO SQS: Clasificación automática mediante IA, disparada por la cola
  ClasificarTicket:
    handler: src/tickets/clasificar_ticket.lambda_handler
    environment:
      GROQ_API_KEY: ${env.GROQ_API_KEY} # 🌟 Reemplaza con tu API Key real de Groq directamente aquí
    events:
      - sqs:
          arn: !GetAtt TicketsQueue.Arn
          batchSize: 1 

  # PRIVADO: El Empleado/Admin consulta los tickets de su área
  ObtenerTickets:
    handler: src/tickets/obtener_tickets.lambda_handler
    events:
      - http:
          path: /tickets
          method: get
          cors: true
          integration: lambda
          request:
            template:
              application/json: |
                {
                  "method": "$context.httpMethod",
                  "path": "$context.path",
                  "headers": {
                    "Authorization": "$input.params('Authorization')"
                  },
                  "body": $input.body,
                  "queryStringParameters": {
                    "tenant_area": "$input.params('tenant_area')",
                    "tenant_id": "$input.params('tenant_id')"
                  }
                }

  # PRIVADO: El Empleado/Admin resuelve un ticket
  ResolverTicket:
      handler: src/tickets/resolver_ticket.lambda_handler
      environment:
        TICKETS_SNS_TOPIC_ARN: !Ref TicketsResueltosTopic # 🌟 Le inyectamos el ARN del Tópico creado abajo
      events:
        - http:
            path: /tickets/{ticket_id}/resolver
            method: put
            cors: true
            integration: lambda
            request:
              template:
                application/json: |
                  {
                    "method": "$context.httpMethod",
                    "path": "$context.path",
                    "headers": {
                      "Authorization": "$input.params('Authorization')"
                    },
                    "body": $input.body,
                    "pathParameters": {
                      "ticket_id": "$input.params('ticket_id')"
                    }
                  }

  # 🌟 NUEVA FUNCIÓN AGREGADA DE MANERA CORRECTA
  EnviarCorreoNotificacion:
      handler: src/tickets/enviar_email.lambda_handler
      environment:
        RESEND_API_KEY: ${env.RESEND_API_KEY} # Tu token de Resend
      events:
        - sns:
            arn: !Ref TicketsResueltosTopic # 🌟 Serverless Framework la suscribe al tópico automáticamente
            topicName: TicketsResueltosTopic

resources:
  Resources:
    # ─── DYNAMODB: Usuarios ───────────────────────────────────────────────
    TablaUsuarios:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: t_usuarios
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: tenant_id
            AttributeType: S
          - AttributeName: correo
            AttributeType: S
          - AttributeName: rol
            AttributeType: S
        KeySchema:
          - AttributeName: tenant_id
            KeyType: HASH
          - AttributeName: correo
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: RolIndex
            KeySchema:
              - AttributeName: rol
                KeyType: HASH
              - AttributeName: tenant_id
                KeyType: RANGE
            Projection:
              ProjectionType: INCLUDE
              NonKeyAttributes:
                - nombre_empresa
                - areas
                - correo
                - area          

    # ─── DYNAMODB: Tokens ─────────────────────────────────────────────────
    TablaTokensAcceso:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: t_tokens_acceso
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: token
            AttributeType: S
        KeySchema:
          - AttributeName: token
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    # ─── DYNAMODB: Tickets ────────────────────────────────────────────────
    TablaTickets:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: t_tickets
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: tenant_id
            AttributeType: S
          - AttributeName: ticket_id
            AttributeType: S
          - AttributeName: tenant_area
            AttributeType: S
          - AttributeName: score
            AttributeType: N
        KeySchema:
          - AttributeName: tenant_id
            KeyType: HASH
          - AttributeName: ticket_id
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: AreaScoreIndex
            KeySchema:
              - AttributeName: tenant_area
                KeyType: HASH
              - AttributeName: score
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    # ─── SQS: Cola de tickets ─────────────────────────────────────────────
    TicketsQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: TicketsQueue
        VisibilityTimeout: 60
        MessageRetentionPeriod: 86400  # 24 horas de retención
    TicketsResueltosTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: TicketsResueltosTopic